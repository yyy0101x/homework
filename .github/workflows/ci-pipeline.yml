name: CI Pipeline

on:
  push:
    branches:
      - develop  # This ensures it triggers on every push to develop

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8

      # LINTING STEP (Requirement: Additional gate)
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # TESTING & COVERAGE STEP (Requirement: >70% coverage)
      - name: Run tests with coverage
        run: pytest --cov=cart --cov-fail-under=70