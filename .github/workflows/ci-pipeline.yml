name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main  # Now triggers on main too

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: pytest --cov=cart --cov-fail-under=70

  deploy:
    needs: check-code  # 1. Must pass tests first
    if: github.ref == 'refs/heads/main'  # 2. Only runs on main
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        # This sends a signal to Render to pull the new code and build the Docker image
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}